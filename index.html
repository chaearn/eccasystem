<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #F2F1ED; }
  /* Root font-size drives every rem-based measurement in the info cards
     (see cardHTML in ECCAsystem.js) — smaller here means the whole card
     (padding, text, gaps) scales down together on a small screen instead
     of staying at desktop size and wrapping into a cramped column. */
  html { font-size: 16px; }
  @media (max-width: 480px) {
    html { font-size: 10px; }
  }
</style>

<body>
<script type="module">

import define from "./index.js";
import {Runtime, Library, Inspector} from "./runtime.js";

const runtime = new Runtime();

// Only the map diagram (the 2nd cell the notebook defines) should render
// visibly — the title, the raw font-loader debug output, and the demo
// paragraph shouldn't show up. Every cell still needs a real Inspector
// though, or the runtime treats it as unreachable and never computes it
// at all — which would silently stop the Contee font from loading. So
// non-diagram cells get a real Inspector too, just pointed at a
// display:none container instead of the visible page.
const hiddenRoot = document.createElement("div");
hiddenRoot.style.display = "none";
document.body.appendChild(hiddenRoot);

const DIAGRAM_CELL_INDEX = 1; // 0 = title, 1 = diagram, 2+ = link/style/font cells
let cellIndex = 0;
function observer() {
  const container = cellIndex++ === DIAGRAM_CELL_INDEX ? document.body : hiddenRoot;
  return Inspector.into(container)();
}

const main = runtime.module(define, observer);

</script>
